name: Ironside Security Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

jobs:

  # ── Job 1: Scan for leaked secrets ──────────────────────────
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks — scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Static code analysis ─────────────────────────────
  sast:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Semgrep — find code vulnerabilities
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python p/flask p/security-audit

  # ── Job 3: Container image scan ─────────────────────────────
  container-scan:
    name: Container Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build Docker image
        run: docker build -t ironside-api:${{ github.sha }} .

      - name: Trivy — scan image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ironside-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Job 4: Deploy — only runs after ALL 3 scans pass ────────
  deploy:
    name: Deploy to Production
    needs: [secrets-scan, sast, container-scan]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Deploy
        run: |
          echo "✅ All security scans passed"
          echo "✅ Deployment approved by reviewer"
          echo "✅ Deploying ironside-api:${{ github.sha }} to production..."
          echo "✅ Done"